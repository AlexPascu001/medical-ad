anchor:
  learnable: false
  max_images_for_pca: 5000
  n_anchors: 16
  n_components: 50
  strategy: kmeans
  use_embedding_space: true
data:
  data_root: d:\Documents\FMI\Disertatie\medical-ad\data\BraTS2021_slice
  normalization: zscore_only
  target_size:
  - 240
  - 240
eval:
  bootstrap_samples: 1000
  compute_pixel: true
loss:
  alpha: 1.0
  beta: 0.5
  delta: 0.1
  dense_weight: 0.5
  distance_metric: euclidean
  diversity_temperature: 0.1
  gamma: 0.0
  global_weight: 1.0
  margin: 1.0
  min_norm: 0.5
  spatial_reduction: mean
  use_dense: false
model:
  backbone: vit_small_patch16_dinov3.lvd1689m
  freeze_backbone: true
  projection_dim: 128
output_dir: d:\Documents\FMI\Disertatie\medical-ad\runs\nofuser_k16\nofuser_k16
pretraining:
  enabled: false
seed: 42
stage2:
  alignment_weight: 0.1
  consistency_loss: cosine
  consistency_weight: 0.1
  early_stopping_metric: reconstruction_pixel_auroc
  early_stopping_patience: 20
  enabled: true
  epochs: 50
  freeze_anchor_target: true
  freeze_anchors: true
  freeze_encoder: true
  freeze_encoder_mode: full
  frozen_bottleneck: true
  lr: 0.0001
  no_fuser: true
  pixel_aggregation:
    method: top_k_percentile
    percentile: 95
    threshold_n_std: 2.0
  pixel_map:
    enabled: true
    type: reconstruction_l2
  pixel_metrics:
    enabled: true
  recon_loss: mse
  recon_weight: 1.0
  score_combination:
    alpha: 0.5
    enabled: false
    normalization: minmax
  score_fusion:
    anchor_weight: 0.4
    divergence_weight: 0.3
    enabled: true
    normalization: minmax
    pixel_weight: 0.3
  unfreeze_last_n_blocks: 2
  unfreeze_lr_multiplier: 0.1
  weight_decay: 0.0001
training:
  batch_size: 64
  early_stopping_patience: 10
  epochs: 100
  fixed_pseudo_labels: true
  log_interval: 50
  lr: 0.0001
  num_workers: 4
  save_checkpoints: false
  use_amp: true
  val_interval: 1
  weight_decay: 0.0001
