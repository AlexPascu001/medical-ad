# RECOMMENDED Configuration for BMAD Brain MRI Anomaly Detection
# This config addresses the critical issues found in analysis

seed: 42
output_dir: './experiments/bmad_no_repeller'

# Data configuration
data:
  data_root: '../data/BraTS2021_slice'
  target_size: [240, 240]

# Anchor configuration
anchor:
  strategy: 'eigenface'
  n_components: 50
  n_anchors: 8
  max_images_for_pca: 10000

# Model configuration
model:
  backbone: 'vit_small_patch16_dinov3.lvd1689m'
  freeze_backbone: true
  projection_dim: 128  # Trainable projection head

# Loss configuration - FIXED
loss:
  margin: 1.0
  alpha: 1.0
  beta: 0.0  # DISABLED repeller loss (critical fix!)
  distance_metric: 'euclidean'
  use_dense: true  # ENABLED dense loss for localization
  global_weight: 1.0
  dense_weight: 0.5
  spatial_reduction: 'mean'

# Training configuration
training:
  epochs: 50
  batch_size: 64
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.000001
  use_amp: true
  log_interval: 50
  val_interval: 1  # Validate every epoch to track metrics
  early_stopping_patience: 15  # Increased patience

# Evaluation configuration
eval:
  compute_pixel: true
  bootstrap_samples: 1000
