# Default Configuration for BMAD Brain MRI Anomaly Detection

seed: 42
output_dir: './runs/bmad_baseline'

# Data configuration
data:
  data_root: './data/BraTS2021_slice'  # Root directory of the dataset
  target_size: [240, 240]  # Image resolution (H, W) - actual BraTS slice size
  train_augment_mode: 'full'  # 'full', 'flip_only', or 'none' for training-only augmentation presets
  use_timm_transforms: false  # Use timm.data.create_transform(..., is_training=false) for model inputs
  timm_data_config: {}        # Optional overrides for resolved timm data config (input_size is set from target_size)

# Anchor configuration
anchor:
  mode: 'global'          # 'global' (current pipeline) or 'patch' (separate dense-anchor path)
  strategy: 'eigenface'     # Strategy: 'eigenface' (PCA + clustering) or 'kmeans' (direct clustering) or 'random'
  n_components: 50          # Number of PCA components (M) - only for eigenface strategy
  n_anchors: 8              # Number of anchors (K)
  max_images_for_pca: 5000  # Max images to use for anchor generation (memory constraint)
  learnable: false          # Make anchors learnable parameters (requires gamma > 0 for min-norm loss)
  init_from: null           # Path to experiment dir to initialize learnable anchors from (optional)
  use_embedding_space: true # SOLUTION A: Generate anchors in 384D DINOv3 space (not pixel space)
  representation: 'closest_samples'  # K-means only: 'closest_samples' or 'centroids'
  patch:
    score_reduction: 'mean'  # Patch mode: aggregate per-location distances with 'mean' or 'max'
  prune:
    min_k: 10              # Only prune smallest clusters when initial K >= min_k
    discard_ratio: 0.0     # Fraction of smallest K-means clusters to drop after the first clustering pass

# Model configuration
model:
  backbone: 'vit_small_patch16_dinov3.lvd1689m'  # Options: vit_small_patch16_dinov3.lvd1689m
  freeze_backbone: true       # Freeze DINOv3 weights (only train projection head)
  projection_dim: 128         # Trainable projection head dimension (set to null to disable)
  projection_activation: 'relu'  # Hidden activation for projection head: 'relu' or 'gelu'
  projection_dropout: 0.0        # Dropout probability between projection layers
  projection_dim_recon: null    # Stage-2 reconstruction projection dim (null = same as projection_dim)

# Loss configuration
loss:
  margin: 1.0             # Margin m for repeller term (anchors should be >= 2m apart)
  alpha: 1.0              # Weight for attractor term (pull samples to anchors)
  beta: 1.0               # Weight for repeller term (push anchors apart)
  gamma: 0.0              # Weight for min-norm term (prevent anchor collapse, use 0.1 for learnable anchors)
  delta: 0.1              # Weight for diversity term (prevent anchor collapse via entropy)
  min_norm: 0.5           # Minimum norm threshold for anchors (only used if gamma > 0)
  diversity_temperature: 0.1  # Temperature for soft anchor assignments (lower = sharper)
  distance_metric: 'euclidean'  # Distance metric: 'euclidean' or 'cosine'
  use_dense: false        # Use dense features for localization
  global_weight: 1.0      # Weight for global loss
  dense_weight: 0.5       # Weight for dense loss
  spatial_reduction: 'mean'  # 'mean' or 'max' for dense loss

# Pre-training configuration (warm-start projection head before anchor projection)
pretraining:
  enabled: false          # Enable projection head pre-training to fix temporal misalignment
  epochs: 5               # Number of pre-training epochs (5-10 recommended)
  lr: 0.001               # Pre-training learning rate (higher than main training)
  batch_size: 64          # Batch size for pre-training
  temp_anchors: 8         # Number of temporary anchors (usually same as n_anchors)
  loss_alpha: 1.0         # Attractor loss weight (same as main training)
  loss_beta: 0.0          # Repeller loss weight (0.0 = no repeller)
  distance_metric: 'euclidean'  # Distance metric (same as main training)

# Training configuration
training:
  epochs: 50
  batch_size: 64
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.000001
  use_amp: true           # Mixed precision training
  log_interval: 50        # Log every N batches
  val_interval: 1         # Validate every N epochs
  early_stopping_patience: 10
  min_epochs_before_early_stopping: 0
  fixed_pseudo_labels: true
  dynamic_reassignment: false
  reassignment_interval: 5
  pseudo_label_assignment: 'nearest'  # 'nearest' or 'capacitated' for the initial fixed pseudo-label pass
  capacity_multiplier: 2.0            # Max samples per anchor = ceil(multiplier * N / effective_K)

# Stage-2 reconstruction training (optional)
stage2:
  enabled: false
  epochs: 20
  lr: 0.0001
  weight_decay: 0.000001
  freeze_encoder: true
  freeze_anchors: true
  freeze_anchor_target: true
  recon_loss: 'mse'            # 'mse' or 'l1'
  recon_weight: 1.0
  consistency_loss: 'cosine'   # 'cosine' or 'l2'
  consistency_weight: 0.1

  # Dual-bottleneck: frozen stage-1 projection + trainable stage-2 projection
  frozen_bottleneck: true       # Enable frozen copy of stage-1 projection head
  alignment_weight: 0.1         # Weight for cosine alignment loss between frozen and trainable features
  alignment_target: 'sample'    # 'sample' (frozen sample projection) or 'anchor' (fixed Stage-1 anchor target)

  # Encoder freezing mode for stage-2
  freeze_encoder_mode: 'full'   # 'full' (freeze all), 'partial' (unfreeze last N blocks), 'none' (train all)
  unfreeze_last_n_blocks: 2     # Number of last transformer blocks to unfreeze (when freeze_encoder_mode='partial')
  unfreeze_lr_multiplier: 0.1   # LR multiplier for unfrozen encoder params (relative to stage2.lr)

  # Pixel-to-image anomaly score aggregation
  pixel_aggregation:
    method: 'top_k_percentile'  # 'mean', 'max', 'top_k_percentile', 'threshold_ratio'
    percentile: 95              # Percentile for top_k_percentile method (e.g., 95 = top 5%)
    threshold_n_std: 2.0        # N std deviations above mean for threshold_ratio (adaptive threshold)

  # Three-signal score fusion (anchor + divergence + pixel-aggregated)
  score_fusion:
    enabled: false              # Enable three-signal fusion for final image_score
    normalization: 'minmax'     # 'minmax', 'zscore', 'robust', 'rank'
    anchor_weight: 0.4          # Weight for anchor-based score
    divergence_weight: 0.3      # Weight for bottleneck divergence score
    pixel_weight: 0.3           # Weight for pixel-aggregated reconstruction score

  pixel_map:
    enabled: true
    type: 'reconstruction_l2'  # 'reconstruction_l2' or 'reconstruction_l1'
  pixel_metrics:
    enabled: true
  score_combination:
    enabled: false
    alpha: 0.5
    normalization: 'minmax'    # 'minmax' or 'zscore'
  early_stopping_patience: 10
  early_stopping_metric: 'pixel_aggregated_image_auroc'  # Best metric for early stopping (fallbacks: reconstruction_image_auroc, val_loss)

# Evaluation configuration
eval:
  compute_pixel: true     # Compute pixel-level AUROC
  bootstrap_samples: 1000 # Number of bootstrap samples for CI
