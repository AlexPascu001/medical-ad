# Default Configuration for BMAD Brain MRI Anomaly Detection

seed: 42
output_dir: './experiments/bmad_baseline'

# Data configuration
data:
  data_root: './data/BraTS2021_slice'  # Root directory of the dataset
  target_size: [240, 240]  # Image resolution (H, W) - actual BraTS slice size

# Anchor configuration
anchor:
  strategy: 'eigenface'     # Strategy: 'eigenface' (PCA + clustering) or 'kmeans' (direct clustering) or 'random'
  n_components: 50          # Number of PCA components (M) - only for eigenface strategy
  n_anchors: 8              # Number of anchors (K)
  max_images_for_pca: 5000  # Max images to use for anchor generation (memory constraint)
  learnable: false          # Make anchors learnable parameters (requires gamma > 0 for min-norm loss)
  init_from: null           # Path to experiment dir to initialize learnable anchors from (optional)
  use_embedding_space: true # SOLUTION A: Generate anchors in 384D DINOv3 space (not pixel space)

# Model configuration
model:
  backbone: 'vit_small_patch16_dinov3.lvd1689m'  # Options: vit_small_patch16_dinov3.lvd1689m
  freeze_backbone: true       # Freeze DINOv3 weights (only train projection head)
  projection_dim: 128         # Trainable projection head dimension (set to null to disable)

# Loss configuration
loss:
  margin: 1.0             # Margin m for repeller term (anchors should be >= 2m apart)
  alpha: 1.0              # Weight for attractor term (pull samples to anchors)
  beta: 1.0               # Weight for repeller term (push anchors apart)
  gamma: 0.0              # Weight for min-norm term (prevent anchor collapse, use 0.1 for learnable anchors)
  delta: 0.1              # Weight for diversity term (prevent anchor collapse via entropy)
  min_norm: 0.5           # Minimum norm threshold for anchors (only used if gamma > 0)
  diversity_temperature: 0.1  # Temperature for soft anchor assignments (lower = sharper)
  distance_metric: 'euclidean'  # Distance metric: 'euclidean' or 'cosine'
  use_dense: false        # Use dense features for localization
  global_weight: 1.0      # Weight for global loss
  dense_weight: 0.5       # Weight for dense loss
  spatial_reduction: 'mean'  # 'mean' or 'max' for dense loss

# Pre-training configuration (warm-start projection head before anchor projection)
pretraining:
  enabled: false          # Enable projection head pre-training to fix temporal misalignment
  epochs: 5               # Number of pre-training epochs (5-10 recommended)
  lr: 0.001               # Pre-training learning rate (higher than main training)
  batch_size: 64          # Batch size for pre-training
  temp_anchors: 8         # Number of temporary anchors (usually same as n_anchors)
  loss_alpha: 1.0         # Attractor loss weight (same as main training)
  loss_beta: 0.0          # Repeller loss weight (0.0 = no repeller)
  distance_metric: 'euclidean'  # Distance metric (same as main training)

# Training configuration
training:
  epochs: 50
  batch_size: 64
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.000001
  use_amp: true           # Mixed precision training
  log_interval: 50        # Log every N batches
  val_interval: 1         # Validate every N epochs
  early_stopping_patience: 10
  fixed_pseudo_labels: true

# Evaluation configuration
eval:
  compute_pixel: true     # Compute pixel-level AUROC
  bootstrap_samples: 1000 # Number of bootstrap samples for CI