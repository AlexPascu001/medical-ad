# Quick-test configuration: 100 training images, 2 anchors, 10 epochs, stage-2 enabled
# Use: python main.py --config configs/quicktest.yaml --exp-name quicktest

seed: 42
output_dir: './runs/quicktest'

data:
  data_root: './data/BraTS2021_slice'
  target_size: [240, 240]
  max_train_samples: 100      # Randomly sample 100 training images

anchor:
  strategy: 'kmeans'          # Simpler / faster than eigenface for a smoke test
  n_components: 10
  n_anchors: 2
  max_images_for_pca: 100
  learnable: false
  use_embedding_space: true

model:
  backbone: 'vit_small_patch16_dinov3.lvd1689m'
  freeze_backbone: true
  projection_dim: 64           # Smaller head for speed

loss:
  margin: 1.0
  alpha: 1.0
  beta: 1.0
  gamma: 0.0
  delta: 0.1
  min_norm: 0.5
  diversity_temperature: 0.1
  distance_metric: 'euclidean'
  use_dense: false
  global_weight: 1.0
  dense_weight: 0.5
  spatial_reduction: 'mean'

pretraining:
  enabled: false

training:
  epochs: 10
  batch_size: 32
  num_workers: 2
  lr: 0.0001
  weight_decay: 0.000001
  use_amp: true
  log_interval: 10
  val_interval: 1
  early_stopping_patience: 10
  fixed_pseudo_labels: true

stage2:
  enabled: true
  epochs: 5
  lr: 0.0001
  weight_decay: 0.000001
  freeze_encoder: true
  freeze_anchors: true
  freeze_anchor_target: true
  frozen_bottleneck: true        # Enable divergence signal
  recon_loss: 'mse'
  recon_weight: 1.0
  consistency_loss: 'cosine'
  consistency_weight: 0.1
  alignment_weight: 0.1
  early_stopping_patience: 5
  early_stopping_metric: 'pixel_aggregated_image_auroc'
  pixel_map:
    enabled: true
    type: 'reconstruction_l2'
  pixel_metrics:
    enabled: true
  pixel_aggregation:
    method: 'top_k_percentile'
    percentile: 95
    threshold_n_std: 2.0
  score_fusion:
    enabled: true
    normalization: 'minmax'
    anchor_weight: 0.4
    divergence_weight: 0.3
    pixel_weight: 0.3

eval:
  compute_pixel: true
  bootstrap_samples: 200       # Fewer bootstrap samples for speed
