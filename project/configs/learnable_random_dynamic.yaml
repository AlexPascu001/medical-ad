# Configuration for Learnable Anchors with Random Initialization + Dynamic Labels
# This uses the CAM Loss (Class Anchor Margin Loss) approach with:
# - Anchors initialized from random samples  
# - Pseudo-labels RECOMPUTED every N epochs as anchors move
# - Learnable anchor embeddings that move in embedding space during training

seed: 42
output_dir: './experiments/bmad_learnable_random_dynamic'

# Data configuration
data:
  data_root: '../data/BraTS2021_slice'
  target_size: [240, 240]

# Anchor configuration
anchor:
  strategy: 'random'        # Random sample selection for anchor initialization
  n_components: 50          # Not used for random, kept for compatibility
  n_anchors: 8              # Number of anchors (K)
  max_images_for_pca: 5000
  learnable: true           # CRITICAL: Make anchors learnable parameters
  init_from: null

# Model configuration
model:
  backbone: 'vit_small_patch16_dinov3.lvd1689m'
  freeze_backbone: true
  projection_dim: 128

# Loss configuration (CAM Loss)
loss:
  type: 'cam'
  margin: 1.0
  alpha: 1.0                # Attractor weight
  beta: 1.0                 # Repeller weight  
  gamma: 0.1                # Min-norm weight
  min_norm: 0.5
  distance_metric: 'euclidean'
  use_dense: false
  global_weight: 1.0
  dense_weight: 0.0

# Training configuration
training:
  epochs: 50
  batch_size: 64
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.000001
  use_amp: true
  log_interval: 50
  val_interval: 1
  early_stopping_patience: 15
  # Dynamic pseudo-label configuration
  fixed_pseudo_labels: true     # Use pseudo-labels (not per-batch nearest anchor)
  dynamic_reassignment: true    # RECOMPUTE pseudo-labels as anchors move
  reassignment_interval: 5      # Recompute every 5 epochs

eval:
  compute_pixel: true
  bootstrap_samples: 1000
