# Random Anchor Baseline Configuration
# Uses randomly selected images as anchors (no learning)

seed: 42
output_dir: './experiments/bmad_baseline'  # Will be auto-renamed to bmad_random_k8

# Data configuration
data:
  data_root: '../data/BraTS2021_slice'
  target_size: [240, 240]

# Anchor configuration - RANDOM BASELINE
anchor:
  strategy: 'random'           # Random selection baseline
  n_components: 50             # Not used for random strategy
  n_anchors: 8                 # Number of anchors (K) - try 4, 8, 16, 32
  max_images_for_pca: 5000     # Not used for random, but kept for consistency

# Model configuration
model:
  backbone: 'vit_small_patch16_dinov3.lvd1689m'
  freeze_backbone: true
  projection_dim: 128

# Loss configuration
loss:
  margin: 1.0
  alpha: 1.0
  beta: 0.0                    # No repeller for baseline
  distance_metric: 'euclidean'
  use_dense: false
  global_weight: 1.0
  dense_weight: 0.5
  spatial_reduction: 'mean'

# Training configuration
training:
  epochs: 50
  batch_size: 64
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.000001
  use_amp: true
  log_interval: 50
  val_interval: 1
  early_stopping_patience: 10

# Evaluation configuration
eval:
  compute_pixel: true
  bootstrap_samples: 1000
