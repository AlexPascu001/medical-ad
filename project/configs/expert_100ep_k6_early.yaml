# Expert's Decoupled Anchor Approach - 100 epochs, 6 anchors, WITH early stopping

seed: 42
output_dir: './experiments/expert_100ep_k6_early'

# Data configuration
data:
  data_root: './data/BraTS2021_slice'
  target_size: [240, 240]

# Anchor configuration - EXPERT'S APPROACH
anchor:
  strategy: 'kmeans'        # K-means in 384D DINOv3 space (semantic clustering)
  n_components: 50          # Only for eigenface strategy
  n_anchors: 6              # 6 semantic clusters
  max_images_for_pca: null  # Use ALL training images (7500)
  learnable: false          # Fixed anchors (not trainable)
  init_from: null
  use_embedding_space: true # ✓ CRITICAL: Generate anchors in 384D DINOv3 space (not pixel space)
  geometric_init: 'random_orthogonal'  # How to init 128D geometric targets: 'random_orthogonal' or 'project_once'

# Model configuration
model:
  backbone: 'vit_small_patch16_dinov3.lvd1689m'
  freeze_backbone: true     # ✓ Keep DINOv3 frozen (semantic features stable)
  projection_dim: 128       # ✓ Trainable projection head (anchors re-projected each forward)

# Loss configuration - EXPERT'S APPROACH with diversity regularization
loss:
  margin: 1.0
  alpha: 1.0                # Attractor weight
  beta: 0.5                 # Repeller weight (push anchors apart)
  gamma: 0.0                # Min-norm (not needed for fixed anchors)
  delta: 0.1                # ✓ DIVERSITY LOSS: Prevent collapse via entropy regularization
  min_norm: 0.5
  diversity_temperature: 0.1  # ✓ Temperature for soft assignments (lower = sharper)
  distance_metric: 'euclidean'
  use_dense: false
  global_weight: 1.0
  dense_weight: 0.5
  spatial_reduction: 'mean'

# Pre-training configuration (DISABLED for Expert's Approach)
pretraining:
  enabled: false
  epochs: 0
  lr: 0.001
  batch_size: 64
  temp_anchors: 6
  loss_alpha: 1.0
  loss_beta: 0.0
  distance_metric: 'euclidean'

# Training configuration
training:
  epochs: 100               # Extended training
  batch_size: 64
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.0001
  use_amp: true
  log_interval: 50
  val_interval: 1
  early_stopping_patience: 10  # WITH early stopping
  fixed_pseudo_labels: true

# Evaluation configuration
eval:
  compute_pixel: true
  bootstrap_samples: 1000
