# Configuration for Learnable Anchors with Random initialization

seed: 42
output_dir: './project/experiments/bmad_learnable_random_k8_l2'

# Data configuration
data:
  data_root: './data/BraTS2021_slice'
  target_size: [240, 240]

# Anchor configuration
anchor:
  strategy: 'random'        # Initialize with random
  n_anchors: 8
  max_images_for_pca: 5000
  learnable: true           # Make anchors learnable
  init_from: './project/experiments/bmad_random_k8_l2'  # Initialize from fixed random experiment

# Model configuration
model:
  backbone: 'vit_small_patch16_dinov3.lvd1689m'
  freeze_backbone: true     # Keep backbone frozen, train projection + anchors
  projection_dim: 128

# Loss configuration (CAM Loss)
loss:
  margin: 1.0               # Minimum distance between anchors
  alpha: 1.0                # Weight for attractor (pull to anchors)
  beta: 1.0                 # Weight for repeller (push anchors apart)
  gamma: 0.1                # Weight for min-norm (prevent collapse)
  min_norm: 0.5             # Minimum anchor norm threshold
  distance_metric: 'euclidean'
  use_dense: false
  global_weight: 1.0
  dense_weight: 0.5
  spatial_reduction: 'mean'

# Training configuration
training:
  epochs: 30                # Fewer epochs since starting from pre-trained
  batch_size: 64
  num_workers: 4
  lr: 0.0001                # Learning rate for projection + anchors
  weight_decay: 0.000001
  use_amp: true
  log_interval: 50
  val_interval: 1
  early_stopping_patience: 10
  fixed_pseudo_labels: true

# Evaluation configuration
eval:
  compute_pixel: true
  bootstrap_samples: 1000
