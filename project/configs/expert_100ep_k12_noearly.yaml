# Expert's Decoupled Anchor Approach - 100 epochs, 12 anchors, WITHOUT early stopping

seed: 42
output_dir: './experiments/expert_100ep_k12_noearly'

# Data configuration
data:
  data_root: './data/BraTS2021_slice'
  target_size: [240, 240]

# Anchor configuration - EXPERT'S APPROACH
anchor:
  strategy: 'kmeans'
  n_components: 50
  n_anchors: 12             # 12 semantic clusters
  max_images_for_pca: null
  learnable: false
  init_from: null
  use_embedding_space: true
  geometric_init: 'random_orthogonal'

# Model configuration
model:
  backbone: 'vit_small_patch16_dinov3.lvd1689m'
  freeze_backbone: true
  projection_dim: 128

# Loss configuration
loss:
  margin: 1.0
  alpha: 1.0
  beta: 0.5
  gamma: 0.0
  delta: 0.1
  min_norm: 0.5
  diversity_temperature: 0.1
  distance_metric: 'euclidean'
  use_dense: false
  global_weight: 1.0
  dense_weight: 0.5
  spatial_reduction: 'mean'

# Pre-training configuration
pretraining:
  enabled: false
  epochs: 0
  lr: 0.001
  batch_size: 64
  temp_anchors: 12
  loss_alpha: 1.0
  loss_beta: 0.0
  distance_metric: 'euclidean'

# Training configuration
training:
  epochs: 100
  batch_size: 64
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.0001
  use_amp: true
  log_interval: 50
  val_interval: 1
  early_stopping_patience: 1000  # WITHOUT early stopping
  fixed_pseudo_labels: true

# Evaluation configuration
eval:
  compute_pixel: true
  bootstrap_samples: 1000
