# Cosine Distance Configuration
# Uses cosine similarity for both training and inference
# Anomaly score = 1 - max(cosine_similarity(sample, anchors))

seed: 42
output_dir: './experiments/bmad_baseline'  # Will be auto-renamed based on strategy

# Data configuration
data:
  data_root: '../data/BraTS2021_slice'
  target_size: [240, 240]

# Anchor configuration
anchor:
  strategy: 'eigenface'     # Options: 'eigenface', 'kmeans', 'random'
  n_components: 50
  n_anchors: 8
  max_images_for_pca: 5000  

# Model configuration
model:
  backbone: 'vit_small_patch16_dinov3.lvd1689m'
  freeze_backbone: true
  projection_dim: 128       # Trainable projection head

# Loss configuration - COSINE DISTANCE
loss:
  margin: 0.5               # Margin for cosine distance (smaller than L2)
  alpha: 1.0                # Weight for attractor term
  beta: 0.0                 # No repeller (set to 0.0 for stability)
  distance_metric: 'cosine' # COSINE distance: 1 - cosine_similarity
  use_dense: false
  global_weight: 1.0
  dense_weight: 0.5
  spatial_reduction: 'mean'

# Training configuration
training:
  epochs: 50
  batch_size: 64
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.000001
  use_amp: true
  log_interval: 50
  val_interval: 1
  early_stopping_patience: 10

# Evaluation configuration
eval:
  compute_pixel: true
  bootstrap_samples: 1000
