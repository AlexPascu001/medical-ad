# Test Configuration: Pre-trained Projection Head + Random Anchors
# Tests Solution 1+3: Warm-start pre-training + Orthogonal initialization

seed: 42
output_dir: './experiments/bmad_pretrain_random_test'

# Data configuration
data:
  data_root: './data/BraTS2021_slice'
  target_size: [240, 240]

# Anchor configuration
anchor:
  strategy: 'kmeans'      # Use kmeans for both pre-training and main training
  n_anchors: 8
  max_images_for_pca: 5000
  learnable: false
  init_from: null

# Model configuration
model:
  backbone: 'vit_small_patch16_dinov3.lvd1689m'
  freeze_backbone: true
  projection_dim: 128

# Loss configuration (CAM loss from paper)
loss:
  margin: 1.0
  alpha: 1.0              # Attractor weight
  beta: 0.5               # ENABLE REPELLER to prevent collapse in main training too!
  gamma: 0.0              # No min-norm (fixed anchors)
  min_norm: 0.5
  distance_metric: 'euclidean'
  use_dense: false
  global_weight: 1.0
  dense_weight: 0.0
  type: 'cam'

# Pre-training configuration (NEW - ENABLED)
pretraining:
  enabled: true           # Enable pre-training to fix temporal misalignment
  epochs: 5               # 5 epochs for quick test (can increase to 10)
  lr: 0.001               # Higher LR than main training (1e-3 vs 1e-4)
  batch_size: 64          # Same as main training
  temp_anchors: 8         # Same as n_anchors
  loss_alpha: 1.0         # Same as main training
  loss_beta: 0.5          # ENABLE REPELLER to prevent collapse!
  distance_metric: 'euclidean'

# Training configuration
training:
  epochs: 50
  batch_size: 64
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.000001
  use_amp: true
  log_interval: 50
  val_interval: 1
  early_stopping_patience: 15
  fixed_pseudo_labels: true
  dynamic_reassignment: false
  reassignment_interval: 5

# Evaluation configuration
eval:
  compute_pixel: true
  bootstrap_samples: 1000
