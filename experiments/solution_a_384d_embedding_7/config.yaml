anchor:
  init_from: null
  learnable: false
  max_images_for_pca: 5000
  n_anchors: 8
  n_components: 50
  strategy: kmeans
  use_embedding_space: true
data:
  data_root: ./data/BraTS2021_slice
  target_size:
  - 240
  - 240
evaluation:
  eval_every: 1
  metric: pixel_auroc
  save_best: true
  save_predictions: true
  visualize_embeddings: true
loss:
  alpha: 1.0
  beta: 0.5
  delta: 0.1
  dense_weight: 0.5
  distance_metric: euclidean
  diversity_temperature: 0.1
  gamma: 0.0
  global_weight: 1.0
  margin: 1.0
  min_norm: 0.5
  spatial_reduction: mean
  use_dense: false
model:
  backbone: vit_small_patch16_dinov3.lvd1689m
  freeze_backbone: true
  projection_dim: 128
output_dir: experiments\solution_a_384d_embedding_7
pretraining:
  batch_size: 64
  distance_metric: euclidean
  enabled: false
  epochs: 0
  loss_alpha: 1.0
  loss_beta: 0.0
  lr: 0.001
  temp_anchors: 8
seed: 42
training:
  batch_size: 64
  epochs: 20
  learning_rate: 0.0001
  min_lr: 1.0e-05
  num_workers: 4
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 2
  weight_decay: 0.0001
