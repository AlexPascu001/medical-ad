anchor:
  init_from: null
  learnable: false
  max_images_for_pca: null
  n_anchors: 1
  n_components: 50
  reproject_anchors: true
  strategy: kmeans
  use_embedding_space: true
data:
  data_root: ./data/BraTS2021_slice
  normalization: zscore_only
  target_size:
  - 240
  - 240
loss:
  alpha: 1.0
  beta: 0.5
  delta: 0.1
  dense_weight: 0.5
  distance_metric: euclidean
  diversity_temperature: 0.1
  gamma: 0.0
  global_weight: 1.0
  margin: 1.0
  min_norm: 0.5
  spatial_reduction: mean
  use_dense: false
model:
  backbone: vit_small_patch16_dinov3.lvd1689m
  freeze_backbone: false
  projection_dim: 128
output_dir: ./experiments/seed_cmp_stage1_s42
pretraining:
  enabled: false
seed: 42
training:
  batch_size: 64
  early_stopping_patience: 10
  epochs: 100
  fixed_pseudo_labels: true
  log_interval: 50
  lr: 0.0001
  num_workers: 4
  save_checkpoints: false
  use_amp: true
  val_interval: 1
  weight_decay: 0.0001
